- id: 大明律.刑律.擅入.夜入民宅
  category: 擅入
  source: 大明律·刑律·贼盗
  era: 明代
  text: "凡夜无故入人家内者,杖八十;主家登时杀死者,勿论。"
  applies_to: [trespass, night, private_home]
  keywords: [夜入, 闯入民宅, 夜闯, 翻墙]
