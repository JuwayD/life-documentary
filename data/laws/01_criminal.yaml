# 大明律 - 刑律 - 斗殴篇
# 来源: 《大明律集解附例》
# 注: 文本为通俗化整理,保留法律精神,便于 AI 引用

- id: 大明律.刑律.斗殴.殴制使及本管长官
  category: 斗殴
  source: 大明律·刑律·斗殴
  era: 明代
  text: "凡杖殴本属知府、知州、知县者,杖一百,徒三年;若致伤者,绞监候。"
  applies_to: [violence, against_official, commoner_to_official]
  keywords: [打, 殴, 攻击, 知府, 知州, 知县, 官员, 长官, 上司]
  consequence_hint: "立即被衙役制服收监,情节重者死罪"

- id: 大明律.刑律.斗殴.斗殴
  category: 斗殴
  source: 大明律·刑律·斗殴
  era: 明代
  text: "凡斗殴以手足殴人不成伤者,笞二十;伤者笞三十;以他物殴人不成伤者,笞三十;伤者笞四十。"
  applies_to: [violence, between_commoners]
  keywords: [打, 殴, 斗, 打架, 平民]
  consequence_hint: "笞刑或杖刑,视伤情而定"

- id: 大明律.刑律.诉讼.越诉
  category: 诉讼
  source: 大明律·刑律·诉讼
  era: 明代
  text: "凡军民词讼,皆须自下而上陈告;若越本管官司,辄赴上司称诉者,笞五十。"
  applies_to: [legal, lawsuit, skip_hierarchy]
  keywords: [告状, 上诉, 越级, 告御状, 拦轿, 越诉]
  consequence_hint: "无论冤情如何,先打五十板"

- id: 大明律.刑律.贼盗.窃盗
  category: 贼盗
  source: 大明律·刑律·贼盗
  era: 明代
  text: "凡窃盗已行而不得财者,笞五十;得财者计赃科断:一贯以下杖六十,五百贯以上绞。"
  applies_to: [theft, stealing]
  keywords: [偷, 窃, 盗, 拿, 顺手牵羊]
  consequence_hint: "按赃物价值定刑,从笞到绞"

- id: 大明律.刑律.诈伪.诈为制书
  category: 诈伪
  source: 大明律·刑律·诈伪
  era: 明代
  text: "凡诈为制书及增减者,皆斩。未施行者,绞。"
  applies_to: [forgery, imperial_document]
  keywords: [伪造, 圣旨, 制书, 矫诏, 假传]
  consequence_hint: "斩立决"

- id: 大明律.刑律.杀人.谋杀
  category: 杀人
  source: 大明律·刑律·人命
  era: 明代
  text: "凡谋杀人造意者斩;从而加功者绞;从而不加功者杖一百、流三千里。"
  applies_to: [murder, premeditated]
  keywords: [杀, 谋杀, 谋害, 害死]
  consequence_hint: "主谋斩,从犯绞或流放"
